{% extends 'layout.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Create an account</h1>
    <p>No email required. Choose a username and password you will remember — account recovery is not possible.</p>

    <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="8" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
        </div>

        <div class="form-group checkbox">
            <input type="checkbox" id="consent" name="consent" required>
            <label for="consent">I understand that account recovery is not possible and that my contributions will be retained in anonymised form if I delete my account.</label>
        </div>

        <button type="submit" class="auth-submit-button">
            Create account
        </button>
        
    </form>

    <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>

</div>
{% endblock %}

{% extends 'layout.html' %}

{% block title %}Log in{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Log in</h1>

    <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" style="background-color: #f8f9fa; color: #457b9d; border: 1px solid #457b9d; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s;">
            Log in
        </button>
    </form>

    <p>No account yet? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
